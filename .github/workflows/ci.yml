name: CI

# Deploy the site to Cloudflare on pushes to main. GitHub-hosted, fork-safe
# (no self-hosted runner): skyphusion-net is a public repo, so a self-hosted
# fleet runner would let fork PRs execute on a build box, and GitHub refuses to
# dispatch public-repo jobs to a runner group that disallows public repos
# anyway. This is just an Astro build + wrangler deploy with no fleet need.
# The `ci` job (typecheck + vitest) satisfies the org required check on PRs;
# typecheck.yml remains the fork-safe hosted path for untrusted fork PRs.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - run: npm run typecheck

      - name: Build Astro site
        run: npm run build

      - name: Start Astro preview server
        run: npx astro preview --port 4321 &

      - name: Wait for Astro server to be ready
        run: |
          echo "Waiting for blog compiler to listen on port 4321..."
          timeout 15s bash -c 'until lsof -i :4321 -s TCP:LISTEN; do sleep 1; done' || true

      - name: Run blog tests
        run: npx vitest run

  deploy:
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npm run deploy
