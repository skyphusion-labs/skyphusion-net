name: CI

# Deploy the site to Cloudflare on pushes to main. GitHub-hosted, fork-safe
# (no self-hosted runner): skyphusion-net is a public repo, so a self-hosted
# fleet runner would let fork PRs execute on a build box, and GitHub refuses to
# dispatch public-repo jobs to a runner group that disallows public repos
# anyway. This is just an Astro build + wrangler deploy with no fleet need.
# Typecheck (push + PR) lives in typecheck.yml on the same GitHub-hosted path.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: [self-hosted, fleet]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npm run deploy
