version: 2

# skyphusion-labs Dependabot standard — see fleet-chezmoi/docs/runbooks/dependabot-standard.md
# PRs only (never auto-merge). Group minor/patch; majors stay separate. Peer families bump together.
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: ci
    groups:
      actions:
        patterns: ["*"]
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: deps
    ignore:
      # wrangler >=4.111 rejects the legacy_env field that @astrojs/cloudflare
      # still emits (skyphusion-net#56); drop this once the adapter stops emitting it.
      - dependency-name: "wrangler"
        versions: [">=4.111.0"]
    groups:
      vitest-toolchain:
        patterns:
          - "vitest"
          - "@vitest/*"
      astro-toolchain:
        patterns:
          - "astro"
          - "@astrojs/*"
          - "wrangler"
      npm-minor-patch:
        patterns: ["*"]
        exclude-patterns:
          - "vitest"
          - "@vitest/*"
          - "astro"
          - "@astrojs/*"
          - "wrangler"
        update-types: ["minor", "patch"]
